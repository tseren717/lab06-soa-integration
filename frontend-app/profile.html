<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>Профайл</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial; background: #f0f2f5; padding: 40px 20px; }
    .container { max-width: 500px; margin: 0 auto; }
    .card { background: #fff; padding: 28px; border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.12); margin-bottom: 16px; }
    h2   { color: #1877f2; margin-bottom: 20px; }
    label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
    input, textarea {
      width: 100%; padding: 10px; margin-bottom: 14px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    textarea { height: 80px; resize: vertical; }
    .btn-row { display: flex; gap: 10px; }
    button { flex: 1; padding: 11px; border: none; border-radius: 6px;
             font-size: 14px; cursor: pointer; }
    .save   { background: #1877f2; color: #fff; }
    .save:hover { background: #166fe5; }
    .logout { background: #e74c3c; color: #fff; }
    .logout:hover { background: #c0392b; }
    .msg { margin-top: 12px; font-size: 13px; }
    .ok  { color: green; }
    .err { color: red; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>👤 Миний профайл</h2>

    <label>Нэр</label>
    <input id="name"     placeholder="Таны нэр"/>
    <label>Имэйл</label>
    <input id="email"    placeholder="Имэйл"/>
    <label>Утас</label>
    <input id="phone"    placeholder="Утасны дугаар"/>
    <label>Байршил</label>
    <input id="location" placeholder="Хот, улс"/>
    <label>Танилцуулга</label>
    <textarea id="bio"   placeholder="Өөрийгөө товч танилцуулна уу..."></textarea>

    <div class="btn-row">
      <button class="save"   onclick="saveProfile()">💾 Хадгалах</button>
      <button class="logout" onclick="logout()">🚪 Гарах</button>
    </div>
    <p class="msg" id="msg"></p>
  </div>
</div>

<script>
  const token  = localStorage.getItem('token');
  const userId = localStorage.getItem('userId');

  // Нэвтрээгүй бол login руу
  if (!token || !userId) window.location.href = 'login.html';

  // Профайл ачаалах
  async function loadProfile() {
    try {
      const res  = await fetch(`http://localhost:3000/users/${userId}`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) return; // шинэ хэрэглэгч — хоосон

      const data = await res.json();
      document.getElementById('name').value     = data.name     || '';
      document.getElementById('email').value    = data.email    || '';
      document.getElementById('phone').value    = data.phone    || '';
      document.getElementById('location').value = data.location || '';
      document.getElementById('bio').value      = data.bio      || '';
    } catch { /* холбогдсонгүй */ }
  }

  // Профайл хадгалах
  async function saveProfile() {
    const msg  = document.getElementById('msg');
    const body = {
      name:     document.getElementById('name').value,
      email:    document.getElementById('email').value,
      phone:    document.getElementById('phone').value,
      location: document.getElementById('location').value,
      bio:      document.getElementById('bio').value
    };

    try {
      // Эхлээд POST (үүсгэх), амжилттай бол PUT (шинэчлэх)
      const res = await fetch(`http://localhost:3000/users/${userId}`, {
        method:  'PUT',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        msg.className   = 'msg ok';
        msg.textContent = '✅ Профайл хадгалагдлаа!';
      } else if (res.status === 404) {
        // Профайл байхгүй тул POST хийх
        await fetch('http://localhost:3000/users', {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(body)
        });
        msg.className   = 'msg ok';
        msg.textContent = '✅ Профайл үүсгэгдлээ!';
      } else {
        msg.className   = 'msg err';
        msg.textContent = '❌ Алдаа гарлаа';
      }
    } catch {
      msg.className   = 'msg err';
      msg.textContent = '❌ Сервертэй холбогдож чадсангүй';
    }
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }

  loadProfile();
</script>
</body>
</html>
